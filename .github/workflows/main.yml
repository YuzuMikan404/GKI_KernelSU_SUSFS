name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false

jobs:
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.fetch.outputs.ksu_commit }}
      anykernel_commit: ${{ steps.fetch.outputs.anykernel_commit }}
      patches_commit: ${{ steps.fetch.outputs.patches_commit }}
      susfs_commit: ${{ steps.fetch.outputs.susfs_commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Fetch Commits
        id: fetch
        uses: ./.github/actions/fetch-commits
        with:
          ksu_commit: ${{ inputs.ksu_commit }}

  build-custom:
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/custom.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: "WKSU+SUSFS+BBG"
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions:
      contents: write
    needs:
    - build-custom

    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download AnyKernel3 Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: '*-AnyKernel3'
        merge-multiple: false

    - name: Package release zips
      run: |
        mkdir -p release-assets
        for dir in ./downloaded-artifacts/*-AnyKernel3; do
          [ -d "$dir" ] || continue
          name=$(basename "$dir")
          (cd "$dir" && zip -r -q -9 "../../release-assets/${name}.zip" .)
        done

    - name: Upload to Actions Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernels
        path: release-assets/*.zip
        if-no-files-found: ignore
